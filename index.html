<style>
:root{scroll-behavior:smooth}body{background:#000;color:#fff;overflow-x:hidden;-webkit-overflow-scrolling:touch;font-family:'Inter',sans-serif}a,button,input,select{touch-action:manipulation}.auth-input{width:100%;background:#111;border:1px solid #333;border-radius:8px;padding:12px 16px;color:#fff;font-size:14px;outline:none;transition:border-color .2s}.auth-input:focus{border-color:#cc0000}.auth-btn{width:100%;background:#cc0000;color:#fff;padding:14px;border:none;border-radius:8px;font-family:'Oswald',sans-serif;font-size:14px;font-weight:700;text-transform:uppercase;letter-spacing:.1em;cursor:pointer;transition:all .2s}.auth-btn:hover{background:#fff;color:#000}.auth-btn:disabled{opacity:0.5;cursor:not-allowed}.card{background:#0a0a0a;border:1px solid #1f1f1f;border-radius:12px;padding:24px;transition:border-color .3s}.card:hover{border-color:#cc0000}.tool-card{background:#0a0a0a;border:1px solid #1f1f1f;border-radius:12px;padding:20px;transition:all .3s}.tool-card:hover{border-color:#cc0000}.usage-bar{width:100%;height:6px;background:#1f1f1f;border-radius:3px;overflow:hidden}.usage-fill{height:100%;background:#cc0000;border-radius:3px;transition:width .5s}.badge{display:inline-block;background:#cc0000;color:#fff;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.1em;padding:3px 8px;border-radius:4px}.view{display:none;animation:fade .3s}.view.active{display:block}.tool-section{display:none}.tool-section.active{display:block}@keyframes fade{from{opacity:0}to{opacity:1}}.spinner{width:40px;height:40px;border:3px solid #1f1f1f;border-top:3px solid #cc0000;border-radius:50%;animation:spin .8s linear infinite}@keyframes spin{to{transform:rotate(360deg)}}#preloader{position:fixed;inset:0;z-index:10000;background:#000;display:flex;align-items:center;justify-content:center;transition:opacity .3s}#preloader.hidden{opacity:0;visibility:hidden;pointer-events:none}.gen-btn{background:#cc0000;color:#fff;padding:10px 24px;border:none;border-radius:8px;font-family:'Oswald',sans-serif;font-size:13px;font-weight:700;text-transform:uppercase;letter-spacing:.1em;cursor:pointer;transition:all .2s;width:100%}.gen-btn:hover{background:#fff;color:#000}.gen-btn:disabled{opacity:0.5;cursor:not-allowed}.gen-status{display:none;align-items:center;gap:8px;padding:10px 14px;background:#111;border:1px solid #333;border-radius:8px;margin-top:12px;font-size:12px;color:#aaa}.gen-status.active{display:flex}.gen-result{display:none;margin-top:12px;padding:12px;background:#111;border:1px solid #333;border-radius:8px}.gen-result.active{display:block}
/* ═══════════════════════════════════════════════════════
   AI REMASTER TOOL — Premium UI
   ═══════════════════════════════════════════════════════ */
.preset-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:12px;margin-bottom:20px}
.preset-card{background:#0a0a0a;border:2px solid #1f1f1f;border-radius:12px;padding:16px;cursor:pointer;transition:all .25s;text-align:center;position:relative;overflow:hidden}
.preset-card:hover{border-color:#333;transform:translateY(-2px)}
.preset-card.active{border-color:var(--pc, #cc0000);background:linear-gradient(135deg, #0a0a0a, var(--pc, #cc0000) 20%)}
.preset-card.active::after{content:'';position:absolute;inset:0;background:radial-gradient(circle at 50% 0%,var(--pc, #cc0000) 20%,transparent 70%);opacity:.15}
.preset-icon{font-size:28px;margin-bottom:8px;display:block}
.preset-name{font-family:'Oswald',sans-serif;font-size:13px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:#fff;margin-bottom:4px}
.preset-desc{font-size:10px;color:#666;line-height:1.4}
.preset-badge{display:inline-block;font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.1em;padding:2px 8px;border-radius:4px;margin-top:6px;background:var(--pc,#cc0000);color:#fff}
.master-drop{border:2px dashed #1f1f1f;border-radius:16px;padding:40px 20px;text-align:center;cursor:pointer;transition:all .3s;position:relative;margin-bottom:20px}
.master-drop:hover,.master-drop.drag{border-color:#cc0000;background:rgba(204,0,0,.03)}
.master-drop.has-file{border-style:solid;border-color:#1a3a1a;background:rgba(0,255,0,.02)}
.master-drop-icon{font-size:48px;margin-bottom:12px;display:block;opacity:.4;transition:all .3s}
.master-drop:hover .master-drop-icon,.master-drop.drag .master-drop-icon{opacity:.8;transform:translateY(-4px)}
.master-drop-text{font-size:14px;color:#888;font-family:'Oswald',sans-serif;text-transform:uppercase;letter-spacing:.1em}
.master-drop-sub{font-size:11px;color:#555;margin-top:4px}
.master-file-info{display:none;align-items:center;gap:12px;background:#111;border:1px solid #1f3f1f;border-radius:10px;padding:12px 16px;margin-bottom:16px}
.master-file-info.active{display:flex}
.master-file-icon{width:40px;height:40px;background:rgba(204,0,0,.1);border-radius:8px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.master-file-name{font-size:12px;color:#ccc;font-family:'Inter',sans-serif;word-break:break-all}
.master-file-size{font-size:10px;color:#666}
.master-ref-upload{display:flex;align-items:center;gap:8px;margin-bottom:16px;font-size:11px;color:#555;cursor:pointer;transition:color .2s}
.master-ref-upload:hover{color:#cc0000}
.master-ref-info{display:none;font-size:10px;color:#4a4;margin-left:auto}
.master-ref-info.active{display:inline}
.compare-section{display:none;margin-top:20px;padding-top:20px;border-top:1px solid #1f1f1f}
.compare-section.active{display:block}
.compare-players{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:16px}
@media(max-width:640px){.compare-players{grid-template-columns:1fr}}
.compare-player{background:#0a0a0a;border:1px solid #1f1f1f;border-radius:12px;padding:16px;text-align:center}
.compare-label{font-family:'Oswald',sans-serif;font-size:11px;text-transform:uppercase;letter-spacing:.1em;margin-bottom:10px}
.compare-label.original{color:#666}
.compare-label.mastered{color:#cc0000}
.compare-player audio{width:100%;height:36px;border-radius:6px}
.master-progress{display:none;align-items:center;gap:12px;background:#111;border:1px solid #1f1f1f;border-radius:10px;padding:16px;margin-top:12px;text-align:left}
.master-progress.active{display:flex}
.master-progress-spinner{flex-shrink:0;width:32px;height:32px;border:2px solid #1f1f1f;border-top:2px solid #cc0000;border-radius:50%;animation:spin .8s linear infinite}
.master-progress-text{flex:1}
.master-progress-title{font-family:'Oswald',sans-serif;font-size:12px;text-transform:uppercase;letter-spacing:.08em;color:#fff}
.master-progress-sub{font-size:10px;color:#666;margin-top:2px}
.master-progress-bar{margin-top:8px;height:3px;background:#1f1f1f;border-radius:2px;overflow:hidden}
.master-progress-fill{height:100%;background:#cc0000;border-radius:2px;transition:width .5s;width:0%}
.download-btn{display:none;width:100%;margin-top:12px;background:#cc0000;color:#fff;padding:12px;border:none;border-radius:8px;font-family:'Oswald',sans-serif;font-size:13px;font-weight:700;text-transform:uppercase;letter-spacing:.1em;cursor:pointer;transition:all .2s}
.download-btn:hover{background:#fff;color:#000}
.download-btn.active{display:block}
.master-actions{display:flex;gap:8px}
.undo-compare-btn{display:none;background:transparent;border:1px solid #333;color:#888;padding:8px 16px;border-radius:8px;font-size:11px;cursor:pointer;transition:all .2s;font-family:'Oswald',sans-serif;text-transform:uppercase;letter-spacing:.08em}
.undo-compare-btn:hover{background:#1f1f1f;color:#fff}
.undo-compare-btn.active{display:inline-block}
</style>
</head>
<body class="antialiased min-h-screen">

<div id="debug-status" style="position:fixed;top:0;left:0;right:0;z-index:9999;background:#111;color:#0f0;font-size:11px;padding:4px 10px;font-family:monospace;display:none;border-bottom:1px solid #333"></div>
<div id="preloader"><div class="spinner"></div></div>
<script>
// Failsafe: hide preloader even if CDN scripts fail
(function(){
  var t=setTimeout(function(){var p=document.getElementById('preloader');if(p)p.style.display='none'},4000);
  document.addEventListener('DOMContentLoaded',function(){clearTimeout(t);var p=document.getElementById('preloader');if(p)p.style.display='none'});
})();
</script>

<!-- Nav -->
<header class="fixed top-0 w-full z-40 bg-[#0a0a0a]/95 border-b border-white/5">
<div class="max-w-6xl mx-auto px-4 py-3 flex justify-between items-center">
<a href="https://beachside-website.vercel.app" class="flex items-center gap-3">
<span class="font-urban font-bold text-lg md:text-xl tracking-widest text-white uppercase">Beachside <span class="text-trs-red">✦ Premium</span></span>
</a>
<div class="flex items-center gap-4">
<span id="nav-status" class="text-xs text-gray-500 hidden md:inline"></span>
<button id="nav-signin" onclick="showView('login')" class="text-xs uppercase tracking-widest text-trs-red border border-trs-red px-3 py-1.5 rounded hover:bg-trs-red hover:text-white transition hidden">Sign In</button>
<button id="nav-logout" onclick="logout()" class="text-xs uppercase tracking-widest text-gray-400 hover:text-trs-red transition hidden">Logout</button>

</div>
</div>

<!-- ====== VIEW: LOGIN ====== -->
<div id="view-login" class="view active min-h-screen bg-black flex items-center justify-center px-6 pt-20">
<div class="w-full max-w-md">
<div class="text-center mb-10">
<h2 class="text-3xl font-display font-bold uppercase tracking-widest text-white">Premium Studio</h2>
<p class="text-gray-500 text-sm mt-2">VIP access for Beachside clients</p>
</div>
<div class="flex justify-center gap-0 mb-8 border-b border-white/10">
<button onclick="switchTab('login')" id="ltab" class="pb-4 px-4 font-display uppercase tracking-widest text-trs-red border-b-2 border-trs-red transition">Sign In</button>
<button onclick="switchTab('register')" id="rtab" class="pb-4 px-4 font-display uppercase tracking-widest text-gray-500 border-b-2 border-transparent hover:text-white transition">Register</button>
</div>

</div>
</div>

</div>

<!-- Credits -->

<div class="flex justify-between items-center mb-4">
<h3 class="font-display uppercase tracking-widest text-white text-sm">Generation Credits</h3>
<span class="badge" id="usage-txt">0 / 50</span>
</div>
<div class="usage-bar"><div class="usage-fill" id="usage-bar" style="width:0%"></div></div>

<!-- ===== TOOL: TEXT TO MUSIC ===== -->
<div id="tool-text-to-music" class="tool-section active card">
<div class="flex items-center gap-3 mb-6">
<div class="w-10 h-10 bg-trs-red/20 rounded-lg flex items-center justify-center"><i data-lucide="wand-2" class="w-5 h-5 text-trs-red"></i></div>
<h4 class="font-display uppercase tracking-widest text-white">Text to Music</h4>
</div>
<p class="text-gray-500 text-xs mb-4">Describe a vibe and add optional lyrics. AI generates a complete song with vocals.</p>
<textarea id="ttm-prompt" class="auth-input mb-3" rows="2" placeholder="e.g. Lo-fi hip hop with warm vinyl crackle, relaxed drums, mellow keys, chill vibe..."></textarea>
<textarea id="ttm-lyrics" class="auth-input mb-3" rows="3" placeholder="Optional lyrics — use [Verse], [Chorus], [Bridge] tags. Leave blank for AI to generate...">[Verse]
<div class="flex gap-3 mb-4">
<select id="ttm-duration" class="auth-input w-1/2">
<option value="8">8 seconds</option>
<option value="15" selected>15 seconds</option>
<option value="30">30 seconds</option>
</select>
</div>
<button onclick="generateMusic()" id="ttm-btn" class="gen-btn">✨ Generate Music ($0.03)</button>
<div id="ttm-status" class="gen-status"><div class="spinner" style="width:16px;height:16px"></div><span id="ttm-status-txt">Generating...</span></div>
<div id="ttm-err" class="hidden text-red-400 text-xs mt-2 bg-red-900/20 p-3 rounded-lg"></div>
<div id="ttm-result" class="gen-result">
<p class="text-xs text-gray-400 mb-2">Generated Track:</p>
<audio id="ttm-audio" controls class="w-full" style="border-radius:8px"></audio>
</div>
</div>

<!-- ===== TOOL: STEM SEPARATE ===== -->
<div id="tool-stem-separate" class="tool-section hidden card">

<h4 class="font-display uppercase tracking-widest text-white">Stem Separation</h4>
</div>
<p class="text-gray-500 text-xs mb-4">Upload a track and extract vocals, drums, bass, and other instruments.</p>

<div id="ss-stems" class="space-y-2"></div>
</div>
</div>

</div>
<div class="preset-card" onclick="selectPreset('punchy',this)" style="--pc:#cc0000">
<span class="preset-icon">⚡</span>
<div class="preset-name">Punchy & Loud</div>
<div class="preset-desc">Club-ready, aggressive</div>
<span class="preset-badge">-9 LUFS</span>
</div>
<div class="preset-card" onclick="selectPreset('cinematic',this)" style="--pc:#9333ea">
<span class="preset-icon">🎬</span>
<div class="preset-name">Cinematic Wide</div>
<div class="preset-desc">Epic soundstage</div>
<span class="preset-badge">-14 LUFS</span>
</div>
</div>

<!-- File Upload -->
<div class="master-drop" id="master-drop" onclick="document.getElementById('master-file').click()">
<span class="master-drop-icon">🎵</span>
<div class="master-drop-text">Drop your track here</div>
<div class="master-drop-sub">MP3, WAV, FLAC — up to 100MB</div>
</div>
<input type="file" id="master-file" accept="audio/*" class="hidden" onchange="masterFileSelected(event)">
<div class="master-file-info" id="master-file-info">
<div class="master-file-icon">📄</div>
<div>
<div class="master-file-name" id="master-file-name"></div>
<div class="master-file-size" id="master-file-size"></div>
</div>
<button onclick="clearMasterFile()" style="background:none;border:none;color:#666;cursor:pointer;font-size:18px;margin-left:auto">&times;</button>
</div>

<!-- Reference Track (optional) -->
<div class="master-ref-upload" onclick="document.getElementById('master-ref-file').click()">
<span>📎</span> <span>+ Add reference track for EQ matching</span>
<span class="master-ref-info" id="master-ref-info"></span>
</div>
<input type="file" id="master-ref-file" accept="audio/*" class="hidden" onchange="masterRefSelected(event)">

<!-- Master Button -->
<button onclick="startMaster()" id="master-btn" class="gen-btn" disabled>✦ Master Track (1 credit)</button>

<!-- Progress -->
<div class="master-progress" id="master-progress">
<div class="master-progress-spinner"></div>
<div class="master-progress-text">
<div class="master-progress-title" id="master-progress-title">Mastering in progress...</div>
<div class="master-progress-sub" id="master-progress-sub">Running AI mastering pipeline</div>
<div class="master-progress-bar"><div class="master-progress-fill" id="master-progress-fill"></div></div>
</div>
</div>

<div id="master-err" class="hidden text-red-400 text-xs mt-2 bg-red-900/20 p-3 rounded-lg"></div>

<!-- A/B Comparison -->
<div class="compare-section" id="compare-section">
<h5 class="text-xs uppercase tracking-widest text-gray-400 mb-4">A/B Compare</h5>
<div class="compare-players">
<div class="compare-player">
<div class="compare-label original">◆ Original</div>
<audio id="master-original-audio" controls></audio>
</div>
<div class="compare-player">
<div class="compare-label mastered">✦ Mastered</div>
<audio id="master-result-audio" controls></audio>
</div>
</div>
<div class="master-actions">
<button onclick="downloadMaster()" class="download-btn active" id="master-download-btn">⬇ Download Mastered WAV</button>
<button onclick="resetMaster()" class="undo-compare-btn active" id="master-reset-btn">↻ Master Another Track</button>
</div>
</div>
</div>

</div>
</div>

<!-- Footer -->
<footer class="bg-[#0a0a0a] py-8 px-6 border-t border-white/5 text-center">
<p class="text-gray-600 text-xs uppercase tracking-widest">Beachside Studios Premium Portal</p>
<a href="https://beachside-website.vercel.app" class="text-gray-500 text-xs hover:text-trs-red transition mt-2 inline-block">← Back to Beachside Studios</a>
</footer>

<script>
const API = 'https://api.beachsiderecordingstudio.us/api/premium';
let user = null;

// Simple token helpers
function setToken(t){if(t)try{localStorage.setItem('bstoken',t)}catch(e){}}
function getToken(){try{return localStorage.getItem('bstoken')||''}catch(e){return ''}}
function clearToken(){try{localStorage.removeItem('bstoken')}catch(e){}}

// Hide preloader immediately
(function(){
  var p=document.getElementById('preloader');
  if(p){p.style.display='none'}
})();

// Navigation
function showView(id){
  document.querySelectorAll('.view').forEach(function(v){v.classList.add('hidden');v.classList.remove('active')});
  var el=document.getElementById('view-'+id);
  if(el){el.classList.remove('hidden');el.classList.add('active')}
}

// Auth UI helpers
function authErr(m){
  var e=document.getElementById('auth-err');
  if(e){e.textContent=m;e.classList.remove('hidden');setTimeout(function(){e.classList.add('hidden')},5000)}
}
function authLoad(s){
  var el=document.getElementById('auth-load');
  if(el){if(s)el.classList.remove('hidden');else el.classList.add('hidden')}
}

// Login — SIMPLE version that WORKS
async function login(){
  var em=document.getElementById('lemail'),pw=document.getElementById('lpass');
  if(!em||!pw)return;
  var e=em.value.trim(),p=pw.value;
  if(!e||!p){authErr('Fill in all fields');return}
  authLoad(true);
  try{
    var r=await fetch(API+'/login',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({email:e,password:p})});
    var d=await r.json();
    authLoad(false);
    if(!r.ok){authErr(d.error||'Login failed');return}
    setToken(d.token);
    user=d.user;
    // Update nav
    var si=document.getElementById('nav-signin'),lo=document.getElementById('nav-logout'),da=document.getElementById('nav-dash'),wel=document.getElementById('welcome');
    if(si)si.style.display='none';
    if(lo)lo.style.display='inline-block';
    if(da)da.style.display='inline-block';
    if(wel)wel.textContent=user.name||user.email;
    showView('dashboard')
  }catch(err){
    authLoad(false);
    authErr('Connection error — '+err.message)
  }
}

// Register — simple
async function register(){
  var nm=document.getElementById('rname'),em=document.getElementById('remail'),pw=document.getElementById('rpass'),iv=document.getElementById('rinvite');
  if(!nm||!em||!pw){authErr('Fill in all fields');return}
  var n=nm.value.trim(),e=em.value.trim(),p=pw.value,c=(iv?iv.value:'').trim().toUpperCase();
  if(!n||!e||!p||!c){authErr('Fill in all fields');return}
  authLoad(true);
  try{
    var r=await fetch(API+'/register',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({name:n,email:e,password:p,inviteCode:c})});
    var d=await r.json();
    authLoad(false);
    if(!r.ok){authErr(d.error||'Registration failed');return}
    setToken(d.token);user=d.user;
    // Show dashboard
    var si=document.getElementById('nav-signin'),lo=document.getElementById('nav-logout'),da=document.getElementById('nav-dash'),wel=document.getElementById('welcome');
    if(si)si.style.display='none';
    if(lo)lo.style.display='inline-block';
    if(da)da.style.display='inline-block';
    if(wel)wel.textContent=user.name||user.email;
    showView('dashboard')
  }catch(err){authLoad(false);authErr('Connection error — '+err.message)}
}

function logout(){
  var t=getToken();if(t)fetch(API+'/logout',{method:'POST',headers:{'x-auth-token':t}}).catch(function(){});
  clearToken();user=null;
  document.querySelectorAll('.view').forEach(function(v){v.classList.add('hidden');v.classList.remove('active')});
  var lv=document.getElementById('view-login');if(lv){lv.classList.remove('hidden');lv.classList.add('active')}
  var si=document.getElementById('nav-signin'),lo=document.getElementById('nav-logout'),da=document.getElementById('nav-dash');
  if(si)si.style.display='inline-block';
  if(lo)lo.style.display='none';
  if(da)da.style.display='none'
}

function switchTab(t){
  var lf=document.getElementById('form-login'),rf=document.getElementById('form-reg'),lt=document.getElementById('ltab'),rt=document.getElementById('rtab');
  if(t==='login'){
    if(lf)lf.classList.remove('hidden');if(rf)rf.classList.add('hidden');
    if(lt){lt.className='pb-4 px-4 font-display uppercase tracking-widest text-trs-red border-b-2 border-trs-red transition'}
    if(rt){rt.className='pb-4 px-4 font-display uppercase tracking-widest text-gray-500 border-b-2 border-transparent hover:text-white transition'}
  }else{
    if(lf)lf.classList.add('hidden');if(rf)rf.classList.remove('hidden');
    if(lt){lt.className='pb-4 px-4 font-display uppercase tracking-widest text-gray-500 border-b-2 border-transparent hover:text-white transition'}
    if(rt){rt.className='pb-4 px-4 font-display uppercase tracking-widest text-trs-red border-b-2 border-trs-red transition'}
  }
}

// Tool tabs
function openTool(tool){
  document.querySelectorAll('.tool-section').forEach(function(s){s.classList.remove('active');s.classList.add('hidden')});
  document.querySelectorAll('.tool-tab').forEach(function(b){b.style.background='transparent';b.style.color='';b.style.borderColor='rgba(255,255,255,0.2)'});
  var el=document.getElementById('tool-'+tool);
  if(el){el.classList.remove('hidden');el.classList.add('active')}
  var btns=document.querySelectorAll('.tool-tab'),idx=0;
  if(tool==='text-to-music')idx=0;else if(tool==='stem-separate')idx=1;else if(tool==='revamp')idx=2;else if(tool==='beat-variations')idx=3;else if(tool==='remaster')idx=4;
  if(btns&&btns[idx]){btns[idx].style.background='#cc0000';btns[idx].style.color='#fff';btns[idx].style.borderColor='#cc0000'}
}

// Auto-login check
async function checkSession(){
  var t=getToken();if(!t)return;
  try{
    var r=await fetch(API+'/me',{headers:{'x-auth-token':t}});
    var d=await r.json();
    if(d.user){user=d.user;
      var si=document.getElementById('nav-signin'),lo=document.getElementById('nav-logout'),da=document.getElementById('nav-dash'),wel=document.getElementById('welcome');
      if(si)si.style.display='none';
      if(lo)lo.style.display='inline-block';
      if(da)da.style.display='inline-block';
      if(wel)wel.textContent=user.name||user.email;
      showView('dashboard')
    }
  }catch(e){}
}

// Init
checkSession();
window.addEventListener('load',function(){checkSession()});
setTimeout(function(){openTool('text-to-music')},200);
</script>
</body>
</html>
